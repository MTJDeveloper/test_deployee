<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

    <style>

      body{
            margin:0;
            font-family:Arial;
            background:#f3f2ef;
        }
	
	.navbar-custom{
	height:60px;
	border-bottom:1px solid #add;
	justify-content:space-between;
	align-items:center;
	background:white;
	display:flex;
	padding: 0 100px;

		}

       

        .left-section{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .linkedin-logo{
            width:35px;
        }

        .search-box{
            width:250px;
            border-radius:20px;
            border:none;
            background:#eef3f8;
            padding:8px 15px;
        }

        .right-section{
            display:flex;
            align-items:center;
            gap:30px;
        }

        .nav-item{
            display:flex;
            flex-direction:column;
            align-items:center;
	    justify-content: center;
            font-size:12px;
            color:#555;
            cursor:pointer;
        }	

        .nav-item i{
            font-size:20px;
            margin-bottom:4px;
        }

        .profile-img{
            width:25px;
            height:25px;
            border-radius:50%;
        }

        .vr-line{
            width:1px;
            height:40px;
            background:#ddd;
        }

    </style>

<body>

<div class="navbar-custom">

    <div class="left-section">

        <img src="./linkdin.png" class="linkedin-logo">

        <input type="text"
               class="search-box"
               placeholder="Search">

    </div>

    <div class="right-section">

        <div class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>

        <div class="nav-item">
            <i class="fa-solid fa-user-group"></i>
            <span>My Network</span>
        </div>

        <div class="nav-item">
            <i class="fa-solid fa-briefcase"></i>
            <span>Jobs</span>
        </div>

        <div class="nav-item">
            <i class="fa-solid fa-comment"></i>
            <span>Messaging</span>
        </div>

        <div class="nav-item">
            <i class="fa-solid fa-bell"></i>
            <span>Notifications</span>
        </div>

        <div class="nav-item">
            <img src="./pre_linkdin.jpg" class="profile-img">
            <span>Me</span>
        </div>

        <div class="vr-line"></div>

        <div class="nav-item">
            <i class="fa-solid fa-table-cells"></i>
            <span>For Business</span>
        </div>

    </div>

</div>

</body>
</html>
